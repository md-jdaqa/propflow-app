name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Patch for static export (remove server-only code)
        run: |
          # Remove API routes, auth handlers, and middleware (not supported in static export)
          rm -rf src/app/api
          rm -f src/app/auth/callback/route.ts
          rm -f src/middleware.ts

          # Rewrite server pages with mock data and no Prisma imports
          python3 - <<'PYEOF'

# finances/page.tsx
with open("src/app/(app)/finances/page.tsx", "w") as f:
    f.write(
        'import { FinancesPage } from "@/components/finances/FinancesPage";\n\n'
        'export default function FinancesRoute() {\n'
        '  return <FinancesPage initialTab="overview" initialFilter={undefined} />;\n'
        '}\n'
    )

# properties/page.tsx — must export PropertyListItem for components that import it
with open("src/app/(app)/properties/page.tsx", "w") as f:
    f.write(
        'import { PropertiesPage } from "@/components/properties/PropertiesPage";\n\n'
        'export type PropertyListItem = {\n'
        '  id: string;\n'
        '  name: string;\n'
        '  addressLine1: string;\n'
        '  addressLine2: string | null;\n'
        '  city: string;\n'
        '  state: string;\n'
        '  postalCode: string;\n'
        '  propertyType: "RESIDENTIAL_LTR" | "RESIDENTIAL_STR" | "COMMERCIAL" | "MIXED_USE";\n'
        '  unitsCount: number;\n'
        '  occupiedCount: number;\n'
        '};\n\n'
        'const MOCK: PropertyListItem[] = [\n'
        '  { id: "m1", name: "Brooklyn Brownstone", addressLine1: "123 Main St", addressLine2: null, city: "Brooklyn", state: "NY", postalCode: "11201", propertyType: "RESIDENTIAL_LTR", unitsCount: 3, occupiedCount: 2 },\n'
        '  { id: "m2", name: "Park Slope Duplex", addressLine1: "456 Park Ave", addressLine2: "Apt B", city: "Brooklyn", state: "NY", postalCode: "11215", propertyType: "RESIDENTIAL_LTR", unitsCount: 2, occupiedCount: 2 },\n'
        '  { id: "m3", name: "Beachside STR", addressLine1: "789 Shore Rd", addressLine2: null, city: "Long Beach", state: "NY", postalCode: "11561", propertyType: "RESIDENTIAL_STR", unitsCount: 1, occupiedCount: 0 },\n'
        '];\n\n'
        'export default function PropertiesRoute() {\n'
        '  return <PropertiesPage data={MOCK} initialAction={null} usingMock={true} />;\n'
        '}\n'
    )

# tenants/page.tsx — must export TenantListItem and TenantUnitOption
with open("src/app/(app)/tenants/page.tsx", "w") as f:
    f.write(
        'import { TenantsPage } from "@/components/tenants/TenantsPage";\n\n'
        'export type TenantListItem = {\n'
        '  id: string;\n'
        '  firstName: string;\n'
        '  lastName: string;\n'
        '  email: string | null;\n'
        '  phone: string | null;\n'
        '  unitLabel: string | null;\n'
        '  propertyName: string | null;\n'
        '  leaseStart: string | null;\n'
        '  leaseEnd: string | null;\n'
        '  monthlyRent: number | null;\n'
        '};\n\n'
        'export type TenantUnitOption = {\n'
        '  id: string;\n'
        '  label: string;\n'
        '  propertyName: string;\n'
        '};\n\n'
        'const MOCK_TENANTS: TenantListItem[] = [\n'
        '  { id: "t1", firstName: "Alex", lastName: "Johnson", email: "alex@example.com", phone: "555-0101", unitLabel: "Unit 1", propertyName: "Brooklyn Brownstone", leaseStart: "2025-01-01", leaseEnd: "2026-12-31", monthlyRent: 2400 },\n'
        '  { id: "t2", firstName: "Bri", lastName: "Lee", email: "bri@example.com", phone: "555-0102", unitLabel: "Unit 2", propertyName: "Brooklyn Brownstone", leaseStart: "2024-09-01", leaseEnd: "2025-08-31", monthlyRent: 1800 },\n'
        '  { id: "t3", firstName: "Chris", lastName: "Davis", email: null, phone: "555-0103", unitLabel: "Apt B", propertyName: "Park Slope Duplex", leaseStart: "2025-03-15", leaseEnd: "2026-03-14", monthlyRent: 3100 },\n'
        '];\n\n'
        'const MOCK_UNITS: TenantUnitOption[] = [\n'
        '  { id: "u1", label: "Unit 1", propertyName: "Brooklyn Brownstone" },\n'
        '  { id: "u2", label: "Unit 2", propertyName: "Brooklyn Brownstone" },\n'
        '  { id: "u3", label: "Apt B", propertyName: "Park Slope Duplex" },\n'
        '];\n\n'
        'export default function TenantsRoute() {\n'
        '  return <TenantsPage data={MOCK_TENANTS} units={MOCK_UNITS} initialAction={null} usingMock={true} />;\n'
        '}\n'
    )

print("Static patches applied successfully.")
PYEOF

      - name: Build static export
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
